<style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            background-color: #fff8f4;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            user-select: none;
        }

        /* Perspective Map Container */
        .world-map-container {
            perspective: 1200px;
            overflow: hidden;
        }

        .world-map-inner {
            transform: rotateX(30deg) translateY(-50px);
            transform-style: preserve-3d;
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(2deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        .floating { animation: float 4s ease-in-out infinite; }
        
        @keyframes sway {
            0% { transform: skewX(0deg); }
            50% { transform: skewX(2deg); }
            100% { transform: skewX(0deg); }
        }
        .sway { animation: sway 3s ease-in-out infinite; transform-origin: bottom; }

        @keyframes cloud-move {
            from { transform: translateX(-100%); }
            to { transform: translateX(100vw); }
        }
        .cloud { animation: cloud-move 60s linear infinite; }

        /* Tactile Glassmorphism */
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);

<!-- Map Pan Interaction Script -->
<script>
        const mapInner = document.querySelector('.world-map-inner');
        let isDragging = false;
        let startX, startY, scrollLeft, scrollTop;

        document.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.pageX - mapInner.offsetLeft;
            startY = e.pageY - mapInner.offsetTop;
            mapInner.style.transition = 'none';
        });

        document.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        document.addEventListener('mouseup', () => {
            isDragging = false;
            mapInner.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        });

        document.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            e.preventDefault();
            const x = e.pageX - mapInner.offsetLeft;
            const y = e.pageY - mapInner.offsetTop;
            const walkX = (x - startX) * 0.5; 
            const walkY = (y - startY) * 0.5;
            
            // Simple boundaries and movement feel
            mapInner.style.transform = `rotateX(30deg) translate(${walkX}px, ${walkY}px)`;
        });

        // Touch support
        document.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].pageX - mapInner.offsetLeft;
            startY = e.touches[0].pageY - mapInner.offsetTop;
            mapInner.style.transition = 'none';
        });

        document.addEventListener('touchend', () => {
            isDragging = false;
            mapInner.style.transition = 'transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275)';
        });

        document.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const x = e.touches[0].pageX - mapInner.offsetLeft;
            const y = e.touches[0].pageY - mapInner.offsetTop;
            const walkX = (x - startX) * 0.5;
            const walkY = (y - startY) * 0.5;
            mapInner.style.transform = `rotateX(30deg) translate(${walkX}px, ${walkY}px)`;
        });

        // Micro-interaction: Clicking Lumi
        const lumi = document.getElementById('lumi-companion');
        lumi.addEventListener('click', () => {
            lumi.style.transform = 'scale(1.2)';
            setTimeout(() => {
                lumi.style.transform = 'scale(1)';
            }, 200);
            
            // Create starburst particles
            for(let i=0; i<8; i++) {
                const star = document.createElement('span');
                star.className = 'material-symbols-outlined absolute pointer-events-none text-yellow-400';
                star.style.fontVariationSettings = "'FILL' 1";
                star.innerText = 'star';
                star.style.left = '50%';
                star.style.top = '50%';
                star.style.transition = 'all 0.6s ease-out';
                lumi.appendChild(star);
                
                const angle = (i / 8) * Math.PI * 2;
                const dist = 60 + Math.random() * 40;
                
                requestAnimationFrame(() => {
                    star.style.transform = `translate(${Math.cos(angle)*dist}px, ${Math.sin(angle)*dist}px) scale(0)`;
                    star.style.opacity = '0';
                });
                
                setTimeout(() => star.remove(), 700);
            }
        });
    </script>
</body></html>
