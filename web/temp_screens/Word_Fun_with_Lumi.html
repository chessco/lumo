<style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .perspective-1000 {
            perspective: 1000px;
        }
        .card-inner {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            transform-style: preserve-3d;
        }
        .card-flip {
            transform: rotateY(180deg);
        }
        .card-face {
            backface-visibility: hidden;
        }
        .card-back {
            transform: rotateY(180deg);
        }
        .stardust-particle {
            position: absolute;
            pointer-events: none;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            animation: float 2s ease-out forwards;
        }
        @keyframes float {
            0% { transform: translateY(0) scale(1); opacity: 1; }
            100% { transform: translateY(-50px) scale(0); opacity: 0; }
        }
        .squishy-press:active {
            transform: scale(0.92);
        }
        .glow-pulse {
            animation: glow 2s infinite ease-in-out;
        }
        @keyframes glow {
            0%, 100% { box-shadow: 0 0 20px rgba(132, 88, 228, 0.3); }
            50% { box-shadow: 0 0 40px rgba(132, 88, 228, 0.6); }
        }
    </style>

<script>
        function playAudio(e) {
            e.stopPropagation();
            createStardust(e.target);
            // Simulated audio feedback
            const feedbackText = document.getElementById('feedback-text');
            feedbackText.innerHTML = '<span class="text-secondary font-bold">Lumi: "Man-zah-nah!"</span>';
            
            // Temporary scale up the card
            const card = document.getElementById('flashcard');
            card.style.transform = 'scale(1.05)';
            setTimeout(() => card.style.transform = '', 200);
        }

        function handleSelection(el, isCorrect) {
            const feedbackText = document.getElementById('feedback-text');
            if (isCorrect) {
                el.classList.remove('border-surface-container-highest');
                el.classList.add('border-tertiary', 'bg-tertiary-fixed/20');
                feedbackText.innerHTML = '<span class="text-tertiary font-bold">Excellent! "Apple" is correct! ⭐</span>';
                createStardust(el);
                
                // Update progress bar
                const progressFill = document.getElementById('progress-fill');
                progressFill.style.width = '40%';
            } else {
                el.classList.add('animate-shake', 'border-error');
                feedbackText.innerHTML = '<span class="text-error font-bold">Oops! Try again.</span>';
                setTimeout(() => {
                    el.classList.remove('animate-shake', 'border-error');
                }, 500);
            }
        }

        function createStardust(container) {
            const rect = container.getBoundingClientRect();
            for (let i = 0; i < 12; i++) {
                const particle = document.createElement('div');
                particle.className = 'stardust-particle';
                const size = Math.random() * 8 + 4;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.backgroundColor = i % 2 === 0 ? '#4dffb8' : '#ffb84d';
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                container.appendChild(particle);
                setTimeout(() => particle.remove(), 2000);
            }
        }

        // Add shake animation
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes shake {
                0%, 100% { transform: translateX(0); }
                25% { transform: translateX(-5px); }
                75% { transform: translateX(5px); }
            }
            .animate-shake {
                animation: shake 0.2s ease-in-out 0s 2;
            }
        `;
        document.head.appendChild(style);
    </script>
