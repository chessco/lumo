<script>
        // Micro-interactions
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                // Simple generic click feedback for items without custom active states
                if (!button.classList.contains('lumo-button-primary')) {
                    button.style.transform = 'scale(0.95)';
                }
            });
            button.addEventListener('mouseup', () => {
                button.style.transform = '';
            });
            button.addEventListener('mouseleave', () => {
                button.style.transform = '';
            });
        });

        // Toggle Active State for Hair Options
        const hairButtons = document.querySelectorAll('.grid > button');
        hairButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                if(btn.querySelector('.material-symbols-outlined[data-icon="lock"]')) return;
                
                hairButtons.forEach(b => b.classList.remove('border-primary-container'));
                hairButtons.forEach(b => {
                    const check = b.querySelector('.material-symbols-outlined[data-icon="check"]');
                    if(check) check.parentElement.remove();
                });

                btn.classList.add('border-primary-container');
                const checkMark = document.createElement('div');
                checkMark.className = "absolute top-2 right-2 w-6 h-6 bg-primary-container rounded-full flex items-center justify-center z-10";
                checkMark.innerHTML = `<span class="material-symbols-outlined text-white text-xs" data-icon="check">check</span>`;
                btn.appendChild(checkMark);
            });
        });
    </script>
