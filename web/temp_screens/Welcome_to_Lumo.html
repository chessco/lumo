<style>
        body {
            font-family: 'Quicksand', sans-serif;
            overflow-x: hidden;
            background-color: #fff8f4;
        }

        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        /* Whimsical Cloud Animation */
        @keyframes float-clouds {
            0% { transform: translateX(-10%); }
            100% { transform: translateX(110%); }
        }

        .cloud {
            position: absolute;
            opacity: 0.6;
            animation: float-clouds linear infinite;
            pointer-events: none;
        }

        /* Star Twinkle */
        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        .star {
            position: absolute;
            color: #ffb951;
            animation: twinkle 3s ease-in-out infinite;
        }

        /* Lumi Floating */
        @keyframes lumi-float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
        }

        .lumi-container {
            animation: lumi-float 4s ease-in-out infinite;
            filter: drop-shadow(0 0 30px rgba(255, 185, 81, 0.4));
        }

        /* 3D Button Press Effect */
        .btn-3d {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 #E6A645;
        }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #E6A645;
        }

        .btn-secondary-3d {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0 #5520b3;
        }
        .btn-secondary-3d:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #5520b3;
        }

        /* Masking for Language Selector */
        .lang-active {
            background-color: #825500;
            color: white;
        }
    </style>
</head>

<script>
        // Language Toggling Logic
        function switchLang(lang) {
            const enBtn = document.getElementById('lang-en');
            const esBtn = document.getElementById('lang-es');
            
            if (lang === 'en') {
                enBtn.classList.add('lang-active');
                enBtn.classList.remove('text-on-surface-variant');
                esBtn.classList.remove('lang-active');
                esBtn.classList.add('text-on-surface-variant');
            } else {
                esBtn.classList.add('lang-active');
                esBtn.classList.remove('text-on-surface-variant');
                enBtn.classList.remove('lang-active');
                enBtn.classList.add('text-on-surface-variant');
            }
        }

        // Particle System for Lumi
        const particleContainer = document.getElementById('particle-container');
        function createParticle() {
            const particle = document.createElement('div');
            const size = Math.random() * 8 + 4;
            const x = Math.random() * 100;
            const y = Math.random() * 100;
            const duration = Math.random() * 2 + 2;
            
            particle.className = 'absolute bg-primary-fixed-dim rounded-full blur-[1px] opacity-0';
            particle.style.width = `${size}px`;
            particle.style.height = `${size}px`;
            particle.style.left = `${x}%`;
            particle.style.top = `${y}%`;
            
            particleContainer.appendChild(particle);
            
            particle.animate([
                { opacity: 0, transform: 'scale(0) translateY(0)' },
                { opacity: 0.8, transform: 'scale(1) translateY(-20px)' },
                { opacity: 0, transform: 'scale(0) translateY(-40px)' }
            ], {
                duration: duration * 1000,
                easing: 'ease-out'
            }).onfinish = () => particle.remove();
        }

        setInterval(createParticle, 300);

        // Hover Sparkle Sound Effect Placeholder / Visual Trigger
        const mainBtn = document.querySelector('.btn-3d');
        mainBtn.addEventListener('mouseenter', () => {
            for(let i=0; i<5; i++) {
                setTimeout(createParticle, i * 50);
            }
        });
    </script>
