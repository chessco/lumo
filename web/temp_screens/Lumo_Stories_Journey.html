<style>

            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
        }
        .reading-highlight {
            background: linear-gradient(120deg, rgba(255, 184, 77, 0.4) 0%, rgba(255, 184, 77, 0.4) 100%);
            border-radius: 4px;
            transition: all 0.2s ease;
        }
        .story-border {
            box-shadow: inset 0 0 0 16px rgba(255, 248, 244, 0.3), 
                        inset 0 0 60px rgba(130, 85, 0, 0.1);
        }
        .pulsate-lumi {
            animation: pulse 2s infinite ease-in-out;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 10px rgba(130, 85, 0, 0.2)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 25px rgba(255, 184, 77, 0.4)); }
        }
        .star-burst {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: burst 0.6s ease-out forwards;
        }
        @keyframes burst {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(4); opacity: 0; }
        }
    </style>

<script>
        function playReadAloud() {
            const words = document.querySelectorAll('.word');
            let index = 0;
            
            const interval = setInterval(() => {
                if (index > 0) words[index - 1].classList.remove('reading-highlight');
                if (index < words.length) {
                    words[index].classList.add('reading-highlight');
                    index++;
                } else {
                    clearInterval(interval);
                }
            }, 350);
        }

        function createBurst(btn) {
            const rect = btn.getBoundingClientRect();
            const burst = document.createElement('div');
            burst.className = 'star-burst';
            burst.style.left = (rect.left + rect.width / 2) + 'px';
            burst.style.top = (rect.top + rect.height / 2) + 'px';
            burst.style.width = '20px';
            burst.style.height = '20px';
            document.body.appendChild(burst);
            setTimeout(() => burst.remove(), 600);
        }
    </script>
