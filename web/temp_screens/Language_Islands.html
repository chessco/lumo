<script>
        // Simple star-burst interaction logic
        document.querySelectorAll('.island-float').forEach(island => {
            island.addEventListener('mousedown', () => {
                const colors = ['#ffb84d', '#6b3dca', '#4dffb8'];
                for(let i = 0; i < 8; i++) {
                    createParticle(island, colors[Math.floor(Math.random()*colors.length)]);
                }
            });
        });

        function createParticle(parent, color) {
            const p = document.createElement('div');
            p.style.position = 'absolute';
            p.style.width = '12px';
            p.style.height = '12px';
            p.style.backgroundColor = color;
            p.style.borderRadius = '50%';
            p.style.pointerEvents = 'none';
            p.style.zIndex = '100';
            p.style.left = '50%';
            p.style.top = '50%';
            
            const angle = Math.random() * Math.PI * 2;
            const velocity = 5 + Math.random() * 10;
            const dx = Math.cos(angle) * velocity;
            const dy = Math.sin(angle) * velocity;
            
            parent.appendChild(p);
            
            let pos = {x: 0, y: 0};
            let opacity = 1;
            
            const anim = setInterval(() => {
                pos.x += dx;
                pos.y += dy;
                opacity -= 0.05;
                p.style.transform = `translate(${pos.x}px, ${pos.y}px)`;
                p.style.opacity = opacity;
                
                if(opacity <= 0) {
                    clearInterval(anim);
                    p.remove();
                }
            }, 16);
        }
    </script>
